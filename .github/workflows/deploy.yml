name: deploy

# Manual-only. Run from the Actions tab once the build is green on main.
on:
  workflow_dispatch:

# id-token lets deploy-pages publish via OIDC (GitHub Pages trusted publishing)
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      upload-pages: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
